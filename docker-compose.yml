# Axones Acarigua — producción con Docker (PC empresa / servidor)
# Uso: copiar .env.docker.example → .env, editar contraseñas, luego:
#   docker compose up -d --build

name: axones

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-axones}
      MYSQL_USER: ${MYSQL_USER:-axones}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    # Descomente solo si necesita phpMyAdmin / DBeaver desde la misma PC:
    # ports:
    #   - "3306:3306"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-axones}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-axones}
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-480}
      API_REQUIRE_AUTH: "true"
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  mysql_data:
  uploads_data:
